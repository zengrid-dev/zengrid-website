<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100">
  <defs>
    <linearGradient id="cellGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecca3"/>
      <stop offset="100%" style="stop-color:#3db892"/>
    </linearGradient>
    
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 3x3 Grid Icon -->
  <g transform="translate(30, 16)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="20" height="20" rx="5" ry="3" fill="url(#cellGradDark)" opacity="0.55"/>
    <rect x="24" y="0" width="20" height="20" rx="3" fill="url(#cellGradDark)" opacity="0.7"/>
    <rect x="48" y="0" width="20" height="20" rx="3" ry="5" fill="url(#cellGradDark)" opacity="0.55"/>
    
    <!-- Row 2 -->
    <rect x="0" y="24" width="20" height="20" rx="3" fill="url(#cellGradDark)" opacity="0.7"/>
    <rect x="24" y="24" width="20" height="20" rx="3" fill="url(#cellGradDark)" filter="url(#softGlow)"/>
    <rect x="48" y="24" width="20" height="20" rx="3" fill="url(#cellGradDark)" opacity="0.7"/>
    
    <!-- Row 3 -->
    <rect x="0" y="48" width="20" height="20" rx="3" ry="5" fill="url(#cellGradDark)" opacity="0.45"/>
    <rect x="24" y="48" width="20" height="20" rx="3" fill="url(#cellGradDark)" opacity="0.55"/>
    <rect x="48" y="48" width="20" height="20" rx="5" ry="3" fill="url(#cellGradDark)" opacity="0.45"/>
  </g>
  
  <!-- Wordmark -->
  <text x="125" y="58" 
        font-family="'Outfit', 'SF Pro Display', 'Segoe UI', system-ui, sans-serif" 
        font-size="42" 
        font-weight="300"
        letter-spacing="5">
    <tspan fill="#4ecca3" font-weight="400">Zen</tspan><tspan fill="#ffffff" opacity="0.95">Grid</tspan>
  </text>
</svg>
