<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenGrid — Elegant Wave</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      min-height: 100vh;
    }
    
    /* ═══════════════════════════════════════════════════════════ */
    /* LIGHT VARIANT */
    /* ═══════════════════════════════════════════════════════════ */
    
    .light-section {
      background: linear-gradient(180deg, #fafafa 0%, #f5f5f5 100%);
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      position: relative;
    }
    
    .section-label {
      position: absolute;
      top: 30px;
      left: 40px;
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.35;
    }
    
    .light-section .section-label {
      color: #1a1a2e;
    }
    
    .logo {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    
    .logo-icon {
      position: relative;
      width: 120px;
      height: 120px;
      cursor: pointer;
    }
    
    .cell {
      position: absolute;
      width: 34px;
      height: 34px;
      border-radius: 5px;
      /* Elegant easing - smooth ease-out for natural deceleration */
      transition: 
        transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        opacity 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
        box-shadow 0.5s ease;
    }
    
    .light-section .cell {
      background: linear-gradient(135deg, #3db892 0%, #2a9d7a 100%);
    }
    
    /* Cell positions */
    .cell[data-index="0"] { left: 0; top: 0; }
    .cell[data-index="1"] { left: 43px; top: 0; }
    .cell[data-index="2"] { left: 86px; top: 0; }
    .cell[data-index="3"] { left: 0; top: 43px; }
    .cell[data-index="4"] { left: 43px; top: 43px; }
    .cell[data-index="5"] { left: 86px; top: 43px; }
    .cell[data-index="6"] { left: 0; top: 86px; }
    .cell[data-index="7"] { left: 43px; top: 86px; }
    .cell[data-index="8"] { left: 86px; top: 86px; }
    
    /* Base opacity and corner styling */
    .cell[data-index="0"] { opacity: 0.55; border-radius: 10px 5px 5px 5px; }
    .cell[data-index="1"] { opacity: 0.7; }
    .cell[data-index="2"] { opacity: 0.55; border-radius: 5px 10px 5px 5px; }
    .cell[data-index="3"] { opacity: 0.7; }
    .cell[data-index="4"] { opacity: 1; }
    .cell[data-index="5"] { opacity: 0.7; }
    .cell[data-index="6"] { opacity: 0.45; border-radius: 5px 5px 5px 10px; }
    .cell[data-index="7"] { opacity: 0.55; }
    .cell[data-index="8"] { opacity: 0.45; border-radius: 5px 5px 10px 5px; }
    
    .wordmark {
      font-size: 44px;
      font-weight: 300;
      letter-spacing: 6px;
    }
    
    .light-section .wordmark .zen {
      color: #3db892;
      font-weight: 400;
    }
    
    .light-section .wordmark .grid {
      color: #1a1a2e;
    }
    
    .tagline {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 24px;
      opacity: 0.5;
    }
    
    .light-section .tagline {
      color: #3db892;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* DARK VARIANT */
    /* ═══════════════════════════════════════════════════════════ */
    
    .dark-section {
      background: linear-gradient(180deg, #0a0a10 0%, #0d0d14 100%);
      min-height: 50vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 40px;
      position: relative;
    }
    
    .dark-section .section-label {
      color: #fff;
    }
    
    .dark-section .cell {
      background: linear-gradient(135deg, #4ecca3 0%, #3db892 100%);
      box-shadow: 0 2px 12px rgba(78, 204, 163, 0.12);
    }
    
    .dark-section .cell[data-index="4"] {
      box-shadow: 0 4px 20px rgba(78, 204, 163, 0.25);
    }
    
    .dark-section .wordmark .zen {
      color: #4ecca3;
      font-weight: 400;
    }
    
    .dark-section .wordmark .grid {
      color: #fff;
      opacity: 0.95;
    }
    
    .dark-section .tagline {
      color: #4ecca3;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* ELEGANT WAVE ANIMATION STATES */
    /* ═══════════════════════════════════════════════════════════ */
    
    /* Phase 1: Gentle lift and slight shrink */
    .cell.wave-lift {
      transform: translateY(-3px) scale(0.92);
      opacity: 0.9 !important;
    }
    
    /* Phase 2: Soft expansion with subtle glow */
    .cell.wave-bloom {
      transform: translateY(0) scale(1.04);
      opacity: 1 !important;
    }
    
    /* Phase 3: Graceful settle */
    .cell.wave-settle {
      transform: translateY(0) scale(1);
    }
    
    /* Dark variant glow on bloom */
    .dark-section .cell.wave-bloom {
      box-shadow: 0 6px 24px rgba(78, 204, 163, 0.35);
    }
    
    /* Light variant subtle shadow on bloom */
    .light-section .cell.wave-bloom {
      box-shadow: 0 4px 16px rgba(61, 184, 146, 0.25);
    }
  </style>
</head>
<body>

  <!-- Light Variant -->
  <section class="light-section">
    <span class="section-label">Light</span>
    <div class="logo">
      <div class="logo-icon" id="light-grid">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <div class="wordmark">
        <span class="zen">Zen</span><span class="grid">Grid</span>
      </div>
    </div>
    <p class="tagline">Performance First</p>
  </section>

  <!-- Dark Variant -->
  <section class="dark-section">
    <span class="section-label">Dark</span>
    <div class="logo">
      <div class="logo-icon" id="dark-grid">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <div class="wordmark">
        <span class="zen">Zen</span><span class="grid">Grid</span>
      </div>
    </div>
    <p class="tagline">Performance First</p>
  </section>

  <script>
    // Elegant Wave Ripple
    function initElegantWave(containerId) {
      const container = document.getElementById(containerId);
      const cells = container.querySelectorAll('.cell');
      let isAnimating = false;
      
      const BASE_OPACITIES = [0.55, 0.7, 0.55, 0.7, 1, 0.7, 0.45, 0.55, 0.45];
      
      // Timing configuration - slower and more graceful
      const STAGGER_DELAY = 90;      // Time between each distance level
      const LIFT_DURATION = 280;      // How long the lift phase lasts
      const BLOOM_DURATION = 320;     // How long the bloom phase lasts
      const SETTLE_DURATION = 400;    // How long to settle back
      
      cells.forEach((cell) => {
        cell.addEventListener('mouseenter', () => {
          if (isAnimating) return;
          isAnimating = true;
          
          const hoveredIndex = parseInt(cell.dataset.index);
          const hoveredRow = Math.floor(hoveredIndex / 3);
          const hoveredCol = hoveredIndex % 3;
          
          // Calculate max distance for this grid (corner to corner = 4)
          let maxDistance = 0;
          
          cells.forEach((c, i) => {
            const row = Math.floor(i / 3);
            const col = i % 3;
            const distance = Math.abs(row - hoveredRow) + Math.abs(col - hoveredCol);
            if (distance > maxDistance) maxDistance = distance;
          });
          
          cells.forEach((c, i) => {
            const row = Math.floor(i / 3);
            const col = i % 3;
            const distance = Math.abs(row - hoveredRow) + Math.abs(col - hoveredCol);
            
            const delay = distance * STAGGER_DELAY;
            
            // Phase 1: Lift
            setTimeout(() => {
              c.classList.add('wave-lift');
              
              // Phase 2: Bloom
              setTimeout(() => {
                c.classList.remove('wave-lift');
                c.classList.add('wave-bloom');
                
                // Phase 3: Settle
                setTimeout(() => {
                  c.classList.remove('wave-bloom');
                  c.classList.add('wave-settle');
                  
                  // Clean up
                  setTimeout(() => {
                    c.classList.remove('wave-settle');
                    
                    // Reset animation lock after the furthest cell finishes
                    if (distance === maxDistance) {
                      setTimeout(() => {
                        isAnimating = false;
                      }, 200);
                    }
                  }, SETTLE_DURATION);
                }, BLOOM_DURATION);
              }, LIFT_DURATION);
            }, delay);
          });
        });
      });
    }
    
    // Initialize both grids
    initElegantWave('light-grid');
    initElegantWave('dark-grid');
  </script>

</body>
</html>
